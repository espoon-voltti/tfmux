# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

tasks:
  build:
    desc: Build the tfmux binary into dist/
    cmds:
      - go build -o dist/tfmux ./cmd/tfmux

  run:
    desc: 'Run tfmux (pass args after --, e.g. `task run -- ls`)'
    cmds:
      - go run ./cmd/tfmux {{.CLI_ARGS}}

  install:
    desc: Install tfmux into GOBIN / $GOPATH/bin
    cmds:
      - go install ./cmd/tfmux

  test:
    desc: 'Run the test suite (pass args after --, e.g. `task test -- -run TestFoo`)'
    cmds:
      - go test ./... {{.CLI_ARGS}}

  test:race:
    desc: Run the test suite with the race detector
    cmds:
      - go test -race ./...

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  fmt:
    desc: Format all Go sources
    cmds:
      - gofmt -w .

  fmt:check:
    desc: Fail if any Go source is not gofmt-clean
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "not gofmt-clean:"; echo "$unformatted"; exit 1
        fi

  tidy:
    desc: Tidy go.mod and go.sum
    cmds:
      - go mod tidy

  check:
    desc: Format-check, vet, then test — the pre-commit gate
    cmds:
      - task: fmt:check
      - task: vet
      - task: test

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf dist
